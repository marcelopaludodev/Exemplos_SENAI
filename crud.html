<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="crud.css">
    <script defer src="crud.js" ></script>
    <title>Catalogo | Marselo</title>
</head>

<body>
    <h1 class="titulo1">Catalogo de Produtos</h1>

    <div class="geral">   
        <div class="catalogao">
            <div id="catalogo" class="catalogo"></div>
        </div> 
    
        <main>
            <section>
                <h1 class="titulo2">Modificar Produto</h1>
    
                <form id="formulario" class="formulario">
                    
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" name="nome">
    
                    <label for="preco">Preço</label>
                    <input type="number" id="preco" name="preco">
    
                    <label for="categoria">Categoria</label>
                    <input type="text" id="categoria" name="categoria">
    
                    <label for="quantidade">Quantidade</label>
                    <input type="number" id="quantidade" name="quantidade">
    
                    <div class="botoes">
                        <button type="submit" class="salvar">Salvar</button>
                        <button type="button" class="remover">Remover</button>
                        <button type="button" class="limpar">Limpar</button>
                    </div>
                </form> 
            </section> 
        </main> 
    </div> 
</body>

</html>
