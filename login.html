<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <script defer src="login.js"></script>
    <title>Login | Marselo</title>
</head>
<body>
        <section id="login" class="login">
            <div id="esquerda" class="esquerda">
                <h1>Projeto</h1>
                <h2>By Marselo</h2>

                <img src="/images/gato3.png" alt="Gato Belisario">
            </div>

            <div id="direita" class="direita">
                <img src="/images/gato2.png" alt="Logo Belisario">

                <h2>Login</h2>

                <form id="formulario" class="formulario">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email">
        
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" name="senha">
        
                    <button id="logar" class="logar" type="submit">Entrar</button>
                </form>

                <a href="">Esqueci minha senha</a>
                <a href="">Termos de uso</a>
                <a href="">Política de privacidade</a>
            </div>
        </section><!--LOGIN-->

        <section id="feedback" class="feedback">
            <div id="mensagem" class="mensagem">
                <p></p>
                <img id="imagem" class="imagem" src="/images/gato1.png" alt="Gato Belisario">
            </div>

            <button id="recarregar" class="recarregar">Recarregar</button>
        </section><!--FEEDBACK-->
</body>
</html>
