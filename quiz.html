<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="quiz.css">
    <script defer src="quiz.js"></script>
    <title>Quiz | Marselo</title>
</head>

<body>

    <section id="inicio" class="inicio">
        <h1 id="titulo" class="titulo">Quiz</h1>
    
        <button id="sorteio" class="sorteio">Sortear Pergunta!</button>
    </section><!--inicio-->

    
    <section id="quiz" class="quiz">
        <div id="perguntas" class="perguntas">
            <h2 id="pergunta" class="pergunta">Pergunta</h2>
    
            <div id="botoes" class="botoes">
                <button id="a" class="a">A</button>
                <button id="b" class="b">B</button>
                <button id="c" class="c">C</button>
                <button id="d" class="d">D</button>
            </div>
        </div>
    </section><!--quiz-->
    
    <section id="resultado" class="resultado">
        <div id="retorno" class="retorno"></div>
        <button id="voltar" class="voltar">Voltar</button>
    </section><!--resultado-->

</body>

</html>
